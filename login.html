<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; font-src 'self' data:;">
  <title>SCA Albi — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #fff;
      padding: 20px;
    }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-text {
      font-size: 14px;
      color: #666;
      letter-spacing: 0.1em;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a2a;
      border-top-color: #FECC00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 24px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #FECC00; }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #FECC00; }
    button {
      width: 100%;
      padding: 14px;
      background: #FECC00;
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 4px;
      min-height: 48px;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: default; }
    .error {
      font-size: 12px;
      color: #E24B4A;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }
    .version {
      font-size: 11px;
      color: #333;
      text-align: center;
      margin-top: 24px;
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #888;
    }
    .remember-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      transform: scale(1.2);
    }
  </style>
  <link rel="manifest" href="../manifest.json">
</head>
<body>
  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <img src="https://www.sca-albi.fr/wp-content/uploads/2023/10/cropped-SCA-bis.png" class="loading-logo" alt="SCA Logo">
    <div class="loading-text">CHARGEMENT...</div>
    <div class="loading-spinner"></div>
  </div>

  <div class="login-box">
    <img src="https://www.sca-albi.fr/wp-content/uploads/2023/10/cropped-SCA-bis.png" style="width:80px; margin-bottom:16px; display:block;">
    <div class="subtitle">Sporting Club Albigeois — iPad/Staff</div>
    <label>Email</label>
    <input type="email" id="email" placeholder="prenom@scaalbi.fr" />
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" />

    <div class="remember-row">
      <input type="checkbox" id="rememberMeCheckbox">
      <label for="rememberMeCheckbox">Se souvenir de moi</label>
    </div>

    <button id="login-btn">Se connecter</button>
    <div class="error" id="error-msg"></div>
    <div class="version">v1.0.0 — SCA Albi Performance</div>
  </div>

  <script type="module">
    import { handleLogin } from './app.js';

    document.getElementById('loading-screen')?.classList.add('hidden');

    document.addEventListener('DOMContentLoaded', () => {
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginButton = document.getElementById('login-btn');

      if (localStorage.getItem('rememberMe')) {
        emailInput.value = localStorage.getItem('email') || '';
      }

      loginButton.addEventListener('click', () => {
        handleLogin();
        if (document.getElementById('rememberMeCheckbox').checked) {
          localStorage.setItem('email', emailInput.value);
          localStorage.setItem('rememberMe', true);
        } else {
          localStorage.removeItem('email');
          localStorage.removeItem('rememberMe');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleLogin();
        }
      });
    });
  </script>
</body>
</html>
